services:
  # ── Application Mailing (PHP + Apache via Dockerfile) ──────────────
  mailing-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mailing_platform
    ports:
      - "8087:80"
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
    environment:
      - TZ=Europe/Paris
    networks:
      - mailing-network

networks:
  mailing-network:
    driver: bridge